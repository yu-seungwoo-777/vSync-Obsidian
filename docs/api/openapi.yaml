openapi: "3.0.3"
info:
  title: Vector API
  description: |
    Vector 지식 관리 플랫폼 API. 파일 업로드/다운로드, 이벤트 동기화,
    충돌 관리, 첨부파일 처리를 지원합니다.
  version: "1.0.0"
  contact:
    name: Vector

servers:
  - url: "http://localhost:3000"
    description: Local development

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    # ─── 공통 ────────────────────────────────
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, statusCode]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: name is required
            statusCode:
              type: integer
              example: 400

    # ─── 볼트 ────────────────────────────────
    VaultCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    VaultResponse:
      type: object
      required: [vault_id, api_key, name, created_at]
      properties:
        vault_id:
          type: string
          format: uuid
        api_key:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    # ─── 파일 ────────────────────────────────
    UploadResult:
      type: object
      required: [id, path, hash, size_bytes, version]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        hash:
          type: string
          description: SHA-256 해시
        size_bytes:
          type: integer
          nullable: true
        version:
          type: integer
        auto_merged:
          type: boolean
          description: 3-way merge 자동 병합 여부
        merge_type:
          type: string
          enum: [auto, normal]
          description: 병합 타입 (auto = 자동 병합)

    FileInfo:
      type: object
      required: [id, path, hash, size_bytes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        hash:
          type: string
        size_bytes:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FileDetail:
      type: object
      required: [id, path, hash, size_bytes, content, version]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        hash:
          type: string
        size_bytes:
          type: integer
          nullable: true
        content:
          type: string
          nullable: true
        file_type:
          type: string
          enum: [markdown, attachment]
        version:
          type: integer

    FileUploadRequest:
      type: object
      required: [path, hash]
      properties:
        path:
          type: string
        content:
          type: string
        hash:
          type: string
          description: SHA-256 해시
        base_hash:
          type: string
          description: 충돌 감지용 클라이언트 해시

    DeleteResponse:
      type: object
      required: [message, deleted, path]
      properties:
        message:
          type: string
          example: File deleted
        deleted:
          type: boolean
        path:
          type: string

    EditRequest:
      type: object
      required: [path, old_text, new_text]
      properties:
        path:
          type: string
        old_text:
          type: string
          minLength: 1
        new_text:
          type: string

    EditResponse:
      type: object
      required: [id, path, version, hash, changes]
      properties:
        id:
          type: string
          format: uuid
        path:
          type: string
        version:
          type: integer
        hash:
          type: string
        changes:
          type: integer
          description: 교체 발생 횟수

    # ─── 폴더 ────────────────────────────────
    FolderEntry:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, folder]
        hash:
          type: string
        size_bytes:
          type: integer
          nullable: true
        updated_at:
          type: string
          format: date-time

    FolderListResponse:
      type: object
      required: [folder, entries]
      properties:
        folder:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FolderEntry"

    # ─── 버전 ────────────────────────────────
    FileVersion:
      type: object
      required: [version_num, content_hash, storage_key, created_at]
      properties:
        version_num:
          type: integer
        content_hash:
          type: string
        storage_key:
          type: string
        created_at:
          type: string
          format: date-time

    VersionListResponse:
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/FileVersion"

    BaseContentResponse:
      type: object
      required: [content, hash]
      properties:
        content:
          type: string
        hash:
          type: string

    # ─── 검색 ────────────────────────────────
    SearchResultItem:
      type: object
      required: [path, snippet, score]
      properties:
        path:
          type: string
        snippet:
          type: string
        score:
          type: number

    SearchResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
        total:
          type: integer

    # ─── 동기화 이벤트 ────────────────────────
    SyncEvent:
      type: object
      required: [id, event_type, file_path, device_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [created, updated, deleted, moved]
        file_path:
          type: string
          nullable: true
        file_type:
          type: string
          nullable: true
        device_id:
          type: string
        sequence:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    EventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/SyncEvent"

    SyncStatusRequest:
      type: object
      required: [device_id, last_event_id]
      properties:
        device_id:
          type: string
          pattern: "^[a-zA-Z0-9-_]+$"
        last_event_id:
          type: string
          format: uuid

    SyncStatusResponse:
      type: object
      required: [device_id, vault_id, last_event_id, last_sync_at]
      properties:
        device_id:
          type: string
        vault_id:
          type: string
          format: uuid
        last_event_id:
          type: string
          format: uuid
        last_sync_at:
          type: string
          format: date-time

    # ─── 충돌 ────────────────────────────────
    DiffOperation:
      type: object
      required: [op, text]
      properties:
        op:
          type: integer
          description: "0=equal, 1=insert, -1=delete"
        text:
          type: string

    ConflictResult:
      type: object
      required: [conflict, current_hash, incoming_hash, conflict_path]
      properties:
        conflict:
          type: boolean
          enum: [true]
        current_hash:
          type: string
        incoming_hash:
          type: string
        conflict_path:
          type: string
        base_hash:
          type: string
        diff:
          type: array
          items:
            $ref: "#/components/schemas/DiffOperation"
        can_auto_merge:
          type: boolean

    ConflictInfo:
      type: object
      required: [id, conflict_path, created_at]
      properties:
        id:
          type: string
          format: uuid
        original_path:
          type: string
          nullable: true
        conflict_path:
          type: string
        created_at:
          type: string
          format: date-time

    ConflictListResponse:
      type: object
      required: [conflicts]
      properties:
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ConflictInfo"

    ConflictResolveRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [accept, reject]

    ConflictResolveResponse:
      type: object
      required: [resolution, conflict_id, resolved_at]
      properties:
        resolution:
          type: string
        conflict_id:
          type: string
          format: uuid
        resolved_at:
          type: string
          format: date-time

    MergeResolveRequest:
      type: object
      required: [content, hash]
      properties:
        content:
          type: string
        hash:
          type: string
          description: SHA-256 해시

    MergeResolveResponse:
      type: object
      required: [resolved_at]
      properties:
        resolved_at:
          type: string
          format: date-time

    # ─── 디바이스 ────────────────────────────
    DeviceInfo:
      type: object
      required: [device_id, vault_id, last_event_id, last_sync_at]
      properties:
        device_id:
          type: string
        vault_id:
          type: string
          format: uuid
        last_event_id:
          type: string
          nullable: true
        last_sync_at:
          type: string
          format: date-time
          nullable: true

    DeviceListResponse:
      type: object
      required: [devices]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceInfo"

    # ─── 배치 ────────────────────────────────
    BatchOperation:
      type: object
      required: [type, data]
      properties:
        type:
          type: string
          enum: [create, delete]
        data:
          type: object
          required: [path]
          properties:
            path:
              type: string
            content:
              type: string
            hash:
              type: string

    BatchRequest:
      type: object
      required: [operations]
      properties:
        operations:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/BatchOperation"

    BatchResultItem:
      type: object
      required: [status]
      properties:
        status:
          type: integer
        data:
          description: 성공 시 UploadResult 또는 DeleteResponse
        error:
          type: string

    BatchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchResultItem"

    # ─── 파일 이동 ───────────────────────────
    MoveRequest:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string

    MoveResponse:
      type: object
      required: [path, id]
      properties:
        path:
          type: string
        id:
          type: string
          format: uuid

    # ─── 내보내기 ────────────────────────────
    ExportFile:
      type: object
      required: [path, content, hash, version, updated_at]
      properties:
        path:
          type: string
        content:
          type: string
        hash:
          type: string
        version:
          type: integer
        updated_at:
          type: string
          format: date-time

    ExportResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/ExportFile"

    # ─── 건강 확인 ───────────────────────────
    HealthResponse:
      type: object
      required: [status, database, storage, websocket, timestamp]
      properties:
        status:
          type: string
          example: ok
        database:
          type: boolean
        storage:
          type: boolean
        websocket:
          type: boolean
        timestamp:
          type: string
          format: date-time

    # ─── WebSocket 메시지 (참조용) ───────────
    WSSyncEventData:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
        file_path:
          type: string
        file_type:
          type: string
        device_id:
          type: string
        created_at:
          type: string
        sequence:
          type: integer

    WSMessage:
      type: object
      properties:
        type:
          type: string
          enum: [connected, sync_event, pong]
        vault_id:
          type: string
        timestamp:
          type: string
        data:
          $ref: "#/components/schemas/WSSyncEventData"

  parameters:
    VaultId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 볼트 UUID

    FilePath:
      name: filePath
      in: path
      required: true
      schema:
        type: string
      description: 파일 경로 (와일드카드)

paths:
  # ─── 공개 엔드포인트 ──────────────────────
  /health:
    get:
      operationId: getHealth
      summary: 서버 상태 확인
      tags: [Health]
      responses:
        "200":
          description: 서버 상태 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /vault:
    post:
      operationId: createVault
      summary: 새 볼트 생성
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultCreateRequest"
      responses:
        "201":
          description: 볼트 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── 파일 업로드/조회 ─────────────────────
  /v1/vault/{id}/raw/{filePath}:
    put:
      operationId: uploadRawFile
      summary: Raw 마크다운 업로드 (SHA-256 자동 계산)
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
        - name: x-device-id
          in: header
          schema:
            type: string
          description: 디바이스 식별자
        - name: x-base-hash
          in: header
          schema:
            type: string
          description: 충돌 감지용 클라이언트 해시
      requestBody:
        required: true
        content:
          text/markdown:
            schema:
              type: string
      responses:
        "200":
          description: 업로드 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "409":
          description: 충돌 감지
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResult"
        "413":
          description: 본문 크기 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

    get:
      operationId: getRawFile
      summary: Raw 마크다운 조회
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: 파일 내용
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/file:
    put:
      operationId: uploadFile
      summary: JSON 메타데이터로 파일 업로드
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: x-device-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: 업로드 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"
        "409":
          description: 충돌 감지
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResult"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/file/{filePath}:
    get:
      operationId: getFile
      summary: 파일 내용 조회
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
        - name: base
          in: query
          schema:
            type: string
          description: 특정 해시의 버전 내용 조회
      responses:
        "200":
          description: 파일 상세 정보
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FileDetail"
                  - $ref: "#/components/schemas/BaseContentResponse"
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

    delete:
      operationId: deleteFile
      summary: 파일 소프트 삭제
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
        - name: x-device-id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/files:
    get:
      operationId: listFiles
      summary: 파일 목록 조회
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: 파일 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"

  /v1/vault/{id}/versions/{filePath}:
    get:
      operationId: listVersions
      summary: 파일 버전 목록 조회
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: 버전 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionListResponse"
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/edit:
    post:
      operationId: editFile
      summary: 파일 내용 편집 (old_text → new_text 교체)
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: x-device-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditRequest"
      responses:
        "200":
          description: 편집 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/list:
    get:
      operationId: listFolder
      summary: 폴더 트리 구조 조회
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: folder
          in: query
          schema:
            type: string
            default: "/"
        - name: recursive
          in: query
          schema:
            type: string
            enum: ["true", "false"]
            default: "false"
      responses:
        "200":
          description: 폴더 구조
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"

  # ─── 검색 ─────────────────────────────────
  /v1/vault/{id}/search:
    get:
      operationId: searchFiles
      summary: 마크다운 파일 검색
      tags: [Search]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 500
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: folder
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 검색 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── 동기화 ───────────────────────────────
  /v1/vault/{id}/events:
    get:
      operationId: getEvents
      summary: 동기화 이벤트 폴링
      tags: [Sync]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: since
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: 이벤트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsResponse"

  /v1/vault/{id}/sync-status:
    put:
      operationId: updateSyncStatus
      summary: 디바이스 동기화 상태 업데이트
      tags: [Sync]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncStatusRequest"
      responses:
        "200":
          description: 동기화 상태 업데이트 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── 내보내기 ─────────────────────────────
  /v1/vault/{id}/export:
    get:
      operationId: exportVault
      summary: 볼트 전체 마크다운 내보내기
      tags: [Export]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: 볼트 파일 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  # ─── 첨부파일 ─────────────────────────────
  /v1/vault/{id}/attachment/{filePath}:
    put:
      operationId: uploadAttachment
      summary: 바이너리 첨부파일 업로드 (MinIO)
      tags: [Attachments]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
        - name: x-device-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/gif:
            schema:
              type: string
              format: binary
          image/svg+xml:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          application/pdf:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: 업로드 성공 (id, path, version 반환)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  path:
                    type: string
                  version:
                    type: integer
        "413":
          description: 본문 크기 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

    get:
      operationId: getAttachment
      summary: 바이너리 첨부파일 조회
      tags: [Attachments]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: 바이너리 파일 내용
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── 충돌 관리 ────────────────────────────
  /v1/vault/{id}/conflicts:
    get:
      operationId: listConflicts
      summary: 미해결 충돌 목록 조회
      tags: [Conflicts]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: 충돌 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictListResponse"

  /v1/vault/{id}/conflicts/{conflict_id}/resolve:
    post:
      operationId: resolveConflict
      summary: 충돌 해결 (accept/reject)
      tags: [Conflicts]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: conflict_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConflictResolveRequest"
      responses:
        "200":
          description: 해결 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResolveResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: 충돌 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/vault/{id}/conflicts/{conflict_id}/merge-resolve:
    post:
      operationId: mergeResolveConflict
      summary: 수동 3-way merge 해결
      tags: [Conflicts]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: conflict_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeResolveRequest"
      responses:
        "200":
          description: 병합 해결 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeResolveResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: 충돌 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── 디바이스 관리 ────────────────────────
  /v1/vault/{id}/devices:
    get:
      operationId: listDevices
      summary: 볼트 디바이스 목록 조회
      tags: [Devices]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: 디바이스 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceListResponse"

  /v1/vault/{id}/devices/{device_id}:
    delete:
      operationId: removeDevice
      summary: 디바이스 제거
      tags: [Devices]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 제거 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Device removed

  # ─── 배치/이동 ────────────────────────────
  /v1/vault/{id}/batch:
    post:
      operationId: batchOperations
      summary: 배치 연산 실행
      tags: [Batch]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: x-device-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: 전체 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "207":
          description: 부분 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"

  /v1/vault/{id}/move:
    post:
      operationId: moveFile
      summary: 파일 이동/이름 변경
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: x-device-id
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveRequest"
      responses:
        "200":
          description: 이동 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveResponse"
        "404":
          description: 원본 파일 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: 대상 경로에 이미 파일 존재
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  # ─── WebSocket ────────────────────────────
  /ws/sync/{vault_id}:
    get:
      operationId: wsSync
      summary: 실시간 동기화 WebSocket
      description: |
        WebSocket 연결. OpenAPI 3.0은 WebSocket을 네이티브로 지원하지 않으므로
        참조용으로만 문서화합니다.

        클라이언트 메시지: { "type": "ping" }
        서버 메시지: WSMessage 스키마 참조
      tags: [WebSocket]
      x-websocket: true
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "101":
          description: WebSocket 프로토콜 전환
