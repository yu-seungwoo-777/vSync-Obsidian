name: Release Obsidian Plugin
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Get Version
        id: version
        run: echo "tag=$(git describe --abbrev=0 --tags)" >> $GITHUB_OUTPUT

      - name: Get Previous Tag
        id: prev_tag
        run: |
          prev=$(git tag --sort=-version:refname | sed -n '2p')
          echo "prev=${prev:-}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          mkdir ${{ github.event.repository.name }}
          cp main.js manifest.json styles.css README.md ${{ github.event.repository.name }}
          zip -r ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.prev_tag.outputs.prev }}"

          # Get commit range
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${VERSION}"
            DIFF_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${VERSION}"
          else
            RANGE="${VERSION}"
            DIFF_LINK="**Full Changelog**: https://github.com/${{ github.repository }}/commits/${VERSION}"
          fi

          # Parse conventional commits into grouped files
          feat_file=$(mktemp)
          fix_file=$(mktemp)
          other_file=$(mktemp)

          git log "$RANGE" --pretty=format:"%s" | while read -r msg; do
            desc=$(echo "$msg" | sed -E 's/^[a-z]+(\([^)]*\))?:\s*//')
            if echo "$msg" | grep -qE '^feat'; then
              echo "- ${desc}" >> "$feat_file"
            elif echo "$msg" | grep -qE '^fix'; then
              echo "- ${desc}" >> "$fix_file"
            elif ! echo "$msg" | grep -qE '^(docs|ci|chore)'; then
              echo "- ${desc}" >> "$other_file"
            fi
          done

          # Build release notes
          {
            echo "## What's Changed"
            echo ""

            if [ -s "$feat_file" ]; then
              echo "### Features"
              cat "$feat_file"
              echo ""
            fi

            if [ -s "$fix_file" ]; then
              echo "### Bug Fixes"
              cat "$fix_file"
              echo ""
            fi

            if [ -s "$other_file" ]; then
              echo "### Other Changes"
              cat "$other_file"
              echo ""
            fi

            # First release highlights
            if [ -z "$PREV" ]; then
              echo "### Highlights"
              echo "- 실시간 WebSocket 동기화"
              echo "- 3-way 충돌 해결 UI"
              echo "- 오프라인 큐 및 자동 복구"
              echo "- 바이너리 파일 동기화"
              echo "- 서버 파일 검색"
              echo "- 다중 기기 지원 (JWT + 기기 식별)"
              echo ""
            fi

            echo "## 설치"
            echo ""
            echo '1. \`main.js\`, \`manifest.json\`, \`styles.css\` 를 다운로드'
            echo '2. 볼트의 \`.obsidian/plugins/vsync/\` 폴더에 복사'
            echo '3. Obsidian 재시동'
            echo ""
            echo "또는 Obsidian 커뮤니티 플러그인에서 자동 업데이트."
            echo ""
            echo "---"
            echo ""
            echo "$DIFF_LINK"
          } > release_notes.md

          rm -f "$feat_file" "$fix_file" "$other_file"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ${{ github.event.repository.name }}.zip
            main.js
            manifest.json
            styles.css
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
