name: Sync to Mobile Repo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --dir assets \
            -p 'main.js' -p 'manifest.json' -p 'styles.css'

      - name: Clone Mobile Repo
        uses: actions/checkout@v4
        with:
          repository: yu-seungwoo-777/vSync-Obsidian-Mobile
          token: ${{ secrets.MOBILE_REPO_TOKEN }}
          path: mobile-repo

      - name: Sync artifacts and push
        run: |
          cd mobile-repo

          PLUGIN_DIR=".obsidian/plugins/vsync"
          mkdir -p "$PLUGIN_DIR"
          cp ../assets/main.js "$PLUGIN_DIR/"
          cp ../assets/manifest.json "$PLUGIN_DIR/"
          cp ../assets/styles.css "$PLUGIN_DIR/"

          rm -f main.js manifest.json styles.css

          {
            echo "# Obsidian 설정 (플러그인 제외)"
            echo ".obsidian/*"
            echo "!.obsidian/plugins/"
            echo ".obsidian/plugins/*"
            echo "!.obsidian/plugins/vsync/"
          } > .gitignore

          VERSION=$(node -p "require('./$PLUGIN_DIR/manifest.json').version")

          {
            echo "# vSync Mobile"
            echo ""
            echo "Obsidian iOS/Android 플러그인 저장소"
            echo ""
            echo "## 설치 (Obsidian Git Plugin)"
            echo ""
            echo "1. [Obsidian Git](https://obsidian.md/plugins?id=obsidian-git) 플러그인 설치"
            echo "2. Obsidian Git 설정 - Custom clone URL:"
            echo '   ```'
            echo "   https://github.com/yu-seungwoo-777/vSync-Obsidian-Mobile.git"
            echo '   ```'
            echo '3. Obsidian Git으로 clone → `.obsidian/plugins/vsync/` 구조 자동 생성'
            echo "4. Obsidian 재시동"
            echo "5. 커뮤니티 플러그인에서 vSync 활성화"
            echo ""
            echo "## 수동 설치"
            echo ""
            echo "1. Release에서 main.js, manifest.json, styles.css 다운로드"
            echo '2. 볼트의 .obsidian/plugins/vsync/ 폴더에 복사'
            echo "3. Obsidian 재시동 후 vSync 활성화"
            echo ""
            echo "## 업데이트"
            echo ""
            echo "Obsidian Git에서 Pull로 최신 버전 적용"
            echo ""
            echo "## 현재 버전"
            echo ""
            echo "**${VERSION}**"
          } > README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "release: v${VERSION}"
          git push
